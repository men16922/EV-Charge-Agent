version: '3.8'

services:
  # Mocking AlloyDB with a local PostgreSQL instance equipped with pgvector
  postgres-db:
    image: ankane/pgvector:v0.5.1
    container_name: ev-charge-local-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ev_charge_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpassword
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
