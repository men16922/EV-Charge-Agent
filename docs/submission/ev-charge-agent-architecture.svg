<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">EV-Charge Agent architecture on Google Cloud</title>
  <desc id="desc">Architecture flow from browser to Cloud Run and Flask, then Gemini 2.5 Flash with Google ADK, deterministic tools, BigQuery, hybrid routing, and a live-status adapter.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="agentGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E8F0FE"/>
      <stop offset="1" stop-color="#F3E8FD"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1F3B68" flood-opacity="0.11"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#1F3B68" flood-opacity="0.09"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4285F4"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#34A853"/>
    </marker>
    <style>
      .font { font-family: Inter, "Google Sans", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 42px; font-weight: 750; fill: #172B4D; letter-spacing: -0.7px; }
      .subtitle { font-size: 20px; font-weight: 450; fill: #5F6B7A; }
      .card-title { font-size: 25px; font-weight: 720; fill: #172B4D; }
      .card-subtitle { font-size: 16px; font-weight: 600; fill: #476075; }
      .body { font-size: 16px; font-weight: 450; fill: #44546A; }
      .small { font-size: 14px; font-weight: 500; fill: #52677A; }
      .chip { font-size: 14px; font-weight: 650; fill: #2B4C7E; }
      .backend-title { font-size: 19px; font-weight: 720; fill: #172B4D; }
      .backend-body { font-size: 13.5px; font-weight: 500; fill: #52677A; }
      .arrow-label { font-size: 13px; font-weight: 650; fill: #55708C; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1510" cy="78" r="180" fill="#D9E7FF" opacity="0.44"/>
  <circle cx="45" cy="860" r="155" fill="#E5F3E9" opacity="0.55"/>

  <g class="font">
    <text class="title" x="80" y="76">EV-Charge Agent Architecture</text>
    <text class="subtitle" x="80" y="112">Vehicle-aware decisions powered by Gemini orchestration and verifiable Google Cloud data tools</text>

    <g transform="translate(1331 54)">
      <rect width="189" height="42" rx="21" fill="#FFFFFF" stroke="#D6E2F3"/>
      <circle cx="24" cy="21" r="7" fill="#34A853"/>
      <text x="42" y="27" font-size="15" font-weight="650" fill="#3F5368">APAC · 7,842 sites</text>
    </g>

    <!-- Browser card -->
    <g filter="url(#shadow)">
      <rect x="80" y="190" width="300" height="360" rx="24" fill="#FFFFFF" stroke="#D7E4F5"/>
    </g>
    <rect x="80" y="190" width="300" height="8" rx="4" fill="#4285F4"/>
    <g transform="translate(112 226)">
      <rect width="54" height="42" rx="7" fill="#E8F0FE" stroke="#9FC0FA"/>
      <rect x="7" y="7" width="40" height="24" rx="3" fill="#FFFFFF" stroke="#4285F4" stroke-width="2"/>
      <path d="M21 36h12M27 31v5" stroke="#4285F4" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text class="card-title" x="184" y="251">Browser UX</text>
    <text class="card-subtitle" x="112" y="298">Driver and city-planning interface</text>

    <g transform="translate(112 328)">
      <circle cx="7" cy="7" r="7" fill="#4285F4"/>
      <text class="body" x="25" y="13">Leaflet map and ranked stations</text>
      <circle cx="7" cy="51" r="7" fill="#34A853"/>
      <text class="body" x="25" y="57">Vehicle, connector, battery range</text>
      <circle cx="7" cy="95" r="7" fill="#FBBC04"/>
      <text class="body" x="25" y="101">Equity layer and community KPIs</text>
      <circle cx="7" cy="139" r="7" fill="#EA4335"/>
      <text class="body" x="25" y="145">Streaming chat and tool trace</text>
    </g>
    <rect x="112" y="494" width="236" height="34" rx="17" fill="#F1F6FF"/>
    <text class="chip" x="137" y="516">Leaflet · REST · Server-Sent Events</text>

    <!-- Arrow Browser to Cloud Run -->
    <path d="M395 370 H432" fill="none" stroke="#4285F4" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
    <text class="arrow-label" x="388" y="349">request</text>

    <!-- Cloud Run card -->
    <g filter="url(#shadow)">
      <rect x="450" y="190" width="320" height="360" rx="24" fill="#FFFFFF" stroke="#D7E4F5"/>
    </g>
    <rect x="450" y="190" width="320" height="8" rx="4" fill="#34A853"/>
    <g transform="translate(482 222)">
      <path d="M7 33c-6 0-11-5-11-11S1 11 7 11c3-8 11-13 20-13 11 0 20 8 22 18 7 0 13 6 13 13s-6 13-13 13H9" transform="translate(5 4)" fill="#E6F4EA" stroke="#34A853" stroke-width="2.4"/>
    </g>
    <text class="card-title" x="558" y="251">Cloud Run</text>
    <text class="card-subtitle" x="482" y="298">Flask application and API gateway</text>

    <g transform="translate(482 328)">
      <rect width="256" height="45" rx="12" fill="#F2FAF4" stroke="#B7DFC2"/>
      <text class="body" x="18" y="28">REST endpoints + SSE streaming</text>
      <rect y="58" width="256" height="45" rx="12" fill="#F2FAF4" stroke="#B7DFC2"/>
      <text class="body" x="18" y="86">Request-isolated agent sessions</text>
      <rect y="116" width="256" height="45" rx="12" fill="#F2FAF4" stroke="#B7DFC2"/>
      <text class="body" x="18" y="144">Rate limits + daily hard caps</text>
    </g>
    <rect x="482" y="508" width="256" height="26" rx="13" fill="#E6F4EA"/>
    <text class="small" x="543" y="526">scale to zero · max instances 1</text>

    <!-- Arrow Cloud Run to Agent -->
    <path d="M785 370 C812 370 810 280 835 280" fill="none" stroke="#4285F4" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
    <text class="arrow-label" x="800" y="348">invoke</text>

    <!-- Gemini / ADK card -->
    <g filter="url(#shadow)">
      <rect x="850" y="190" width="670" height="180" rx="24" fill="url(#agentGradient)" stroke="#B8CDF7"/>
    </g>
    <g transform="translate(882 222)">
      <path d="M25 0c3 15 12 24 27 27-15 3-24 12-27 27-3-15-12-24-27-27C13 24 22 15 25 0z" fill="#7357C8"/>
      <circle cx="51" cy="7" r="5" fill="#4285F4"/>
    </g>
    <text class="card-title" x="958" y="245">Gemini Agent</text>
    <text x="958" y="274" font-size="17" font-weight="600" fill="#4D5B73">Intent interpretation · tool selection · response synthesis</text>

    <g transform="translate(882 304)">
      <rect width="150" height="40" rx="20" fill="#FFFFFF" stroke="#B8CDF7"/>
      <text class="chip" x="20" y="25">Gemini 2.5 Flash</text>
      <rect x="166" width="112" height="40" rx="20" fill="#FFFFFF" stroke="#B8CDF7"/>
      <text class="chip" x="188" y="25">Vertex AI</text>
      <rect x="294" width="126" height="40" rx="20" fill="#FFFFFF" stroke="#B8CDF7"/>
      <text class="chip" x="316" y="25">Google ADK</text>
      <rect x="436" width="202" height="40" rx="20" fill="#FFFFFF" stroke="#B8CDF7"/>
      <text class="chip" x="455" y="25">Evidence-backed answers</text>
    </g>

    <!-- Agent to tool layer -->
    <path d="M1185 370 V414" fill="none" stroke="#4285F4" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
    <text class="arrow-label" x="1199" y="402">tool calls</text>

    <!-- Tool layer -->
    <g filter="url(#softShadow)">
      <rect x="850" y="430" width="670" height="120" rx="22" fill="#FFFFFF" stroke="#CADAF0"/>
    </g>
    <text class="card-title" x="882" y="468">Deterministic tool layer</text>
    <text class="small" x="1194" y="467">FunctionTool + MCP</text>
    <g transform="translate(882 492)">
      <rect width="128" height="35" rx="17.5" fill="#E8F0FE"/>
      <text class="chip" x="15" y="23">Nearby search</text>
      <rect x="140" width="128" height="35" rx="17.5" fill="#E6F4EA"/>
      <text class="chip" x="154" y="23">Demand forecast</text>
      <rect x="280" width="116" height="35" rx="17.5" fill="#FEF7E0"/>
      <text class="chip" x="297" y="23">Route planner</text>
      <rect x="408" width="104" height="35" rx="17.5" fill="#FCE8E6"/>
      <text class="chip" x="424" y="23">Live status</text>
      <rect x="524" width="114" height="35" rx="17.5" fill="#F3E8FD"/>
      <text class="chip" x="541" y="23">City insights</text>
    </g>

    <!-- Branch line -->
    <path d="M1185 550 V598 M955 598 H1410 M955 598 V625 M1185 598 V625 M1410 598 V625" fill="none" stroke="#8AA9D6" stroke-width="3" stroke-linecap="round"/>

    <!-- BigQuery backend -->
    <g filter="url(#softShadow)">
      <rect x="850" y="630" width="210" height="165" rx="20" fill="#FFFFFF" stroke="#AFC9F7"/>
    </g>
    <circle cx="883" cy="663" r="16" fill="#4285F4"/>
    <path d="M875 670v-13h4v13zm7 0v-20h4v20zm7 0v-8h4v8z" fill="#FFFFFF"/>
    <text class="backend-title" x="910" y="670">BigQuery</text>
    <text class="backend-body" x="874" y="710">7,842 APAC stations</text>
    <text class="backend-body" x="874" y="735">GEOGRAPHY analytics</text>
    <text class="backend-body" x="874" y="760">ARIMA_PLUS forecast</text>
    <rect x="874" y="772" width="160" height="7" rx="3.5" fill="#DCE8FC"/>

    <!-- Route backend -->
    <g filter="url(#softShadow)">
      <rect x="1080" y="630" width="210" height="165" rx="20" fill="#FFFFFF" stroke="#F1D47A"/>
    </g>
    <circle cx="1113" cy="663" r="16" fill="#FBBC04"/>
    <path d="M1108 656h10l-5 14z" fill="#FFFFFF"/>
    <text class="backend-title" x="1140" y="670">Hybrid routing</text>
    <text class="backend-body" x="1104" y="710">Google Routes first</text>
    <text class="backend-body" x="1104" y="735">Traffic-aware where available</text>
    <text class="backend-body" x="1104" y="760">OSRM / OSM fallback</text>
    <rect x="1104" y="772" width="160" height="7" rx="3.5" fill="#FDE9A9"/>

    <!-- Live backend -->
    <g filter="url(#softShadow)">
      <rect x="1310" y="630" width="210" height="165" rx="20" fill="#FFFFFF" stroke="#A9DCB7"/>
    </g>
    <circle cx="1343" cy="663" r="16" fill="#34A853"/>
    <circle cx="1343" cy="663" r="6" fill="#FFFFFF"/>
    <path d="M1343 650v-5M1343 681v-5M1330 663h-5M1361 663h-5" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    <text class="backend-title" x="1370" y="670">Status adapter</text>
    <text class="backend-body" x="1334" y="710">Simulated demo status</text>
    <text class="backend-body" x="1334" y="735">Provider integration boundary</text>
    <text class="backend-body" x="1334" y="760">Production freshness contract</text>
    <rect x="1334" y="772" width="160" height="7" rx="3.5" fill="#D9EFDF"/>

    <!-- Evidence return path -->
    <path d="M850 718 H810 C795 718 785 703 785 688 V500 C785 486 797 475 812 475 H835" fill="none" stroke="#34A853" stroke-width="3" stroke-dasharray="8 8" stroke-linecap="round" marker-end="url(#arrowGreen)" opacity="0.9"/>
    <text class="arrow-label" x="596" y="620">structured evidence returns</text>

    <!-- Footer -->
    <line x1="80" y1="842" x2="1520" y2="842" stroke="#D4DFEE"/>
    <g transform="translate(80 860)">
      <circle cx="8" cy="8" r="8" fill="#4285F4"/>
      <circle cx="30" cy="8" r="8" fill="#EA4335"/>
      <circle cx="52" cy="8" r="8" fill="#FBBC04"/>
      <circle cx="74" cy="8" r="8" fill="#34A853"/>
      <text x="98" y="14" font-size="15" font-weight="600" fill="#5A6E82">Built on Google Cloud for Meet the Builders · Gen AI Academy, APAC Edition</text>
    </g>
  </g>
</svg>
